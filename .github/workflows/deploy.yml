name: Deploy to OVH VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS using SSH via appleboy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/NewGen
            
            # --- 1. Fix Ownership & Pull Latest Code ---
            sudo chown -R $USER:$USER /home/ubuntu/NewGen
            sudo git reset --hard
            sudo git pull origin main
            
            # --- 2. Build Assets using Docker (No NPM needed on host) ---
            # We use node:20-alpine for a small, fast build container
            sudo rm -rf public/build node_modules
            sudo docker run --rm -v $(pwd):/var/www -w /var/www node:20-alpine sh -c "npm install && npm run build"
            
            # --- 3. Prep Laravel Directories ---
            # Ensure critical folders exist before starting containers
            mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache bootstrap/cache
            sudo chmod -R 777 storage bootstrap/cache
            
            # --- 4. Container Management ---
            # Rebuild and start container services
            sudo docker compose up -d --build
            
            # Debugging: Show container status
            echo "--- Container Status ---"
            sudo docker compose ps
            
            # --- 5. Application Setup (Inside Containers) ---
            # Brief wait for services to initialize
            echo "Waiting for services..."
            sleep 15
            
            # Debugging: Show logs if something failed early
            echo "--- App Logs (Startup) ---"
            sudo docker compose logs app --tail=20
            echo "--- MySQL Logs (Startup) ---"
            sudo docker compose logs mysql --tail=20

            # (Database is now persistent via host-volume, no manual CREATE DB needed)
            
            # Fix git ownership issue within the container
            sudo docker compose exec -T app git config --global --add safe.directory /var/www

            # Install PHP dependencies with Linux-native binaries
            sudo docker compose exec -T app composer install --optimize-autoloader --no-dev
            
            # Run migrations
            sudo docker compose exec -T app php artisan migrate --force
            
            # Seed default admin if missing
            sudo docker compose exec -T app php artisan db:seed --class=DefaultAdminSeeder --force
            
            # Cache everything for performance
            sudo docker compose exec -T app php artisan config:cache
            sudo docker compose exec -T app php artisan route:cache
            sudo docker compose exec -T app php artisan view:cache
            sudo docker compose exec -T app php artisan event:cache
            
            # Restart Horizon
            sudo docker compose exec -T app php artisan horizon:terminate
            
            # --- 6. Final Permission Polish & Refresh Services ---
            # Ensure the web server (www-data / 33) can write to storage
            sudo chown -R 33:33 storage bootstrap/cache
            
            # Restart Nginx to pick up new container IPs (fixes persistent 502 Gateway errors)
            sudo docker compose restart web
            
            # Restart Portainer to reset the security setup timeout
            sudo docker restart portainer
            
            # --- 7. Cleanup ---
            # Remove unused Docker images to save disk space
            sudo docker image prune -f
