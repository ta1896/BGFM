version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: newgen-app
    container_name: newgen_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql

  web:
    image: nginx:alpine
    container_name: newgen_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" # Für Let's Encrypt SSL später
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: newgen_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
      MYSQL_USER: sail
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db-data:
