version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: newgen-app
    container_name: newgen_app
    restart: unless-stopped
    working_dir: /var/www
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis

  web:
    image: nginx:alpine
    container_name: newgen_nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      # - "443:443" # Für Let's Encrypt SSL später
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  scheduler:
    image: newgen-app
    container_name: newgen_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  queue:
    image: newgen-app
    container_name: newgen_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: newgen_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
      MYSQL_USER: sail
    logging: *default-logging
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    container_name: newgen_redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data

  reverb:
    image: newgen-app
    container_name: newgen_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --debug
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

volumes:
  db-data:
  redis-data:
