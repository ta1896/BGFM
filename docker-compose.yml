version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: newgen-app
    container_name: newgen_app
    restart: unless-stopped
    working_dir: /var/www
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: nginx:alpine
    container_name: newgen_nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      # - "443:443" # Für Let's Encrypt SSL später
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
      - nginx-logs:/var/log/nginx
    depends_on:
      - app

  scheduler:
    image: newgen-app
    container_name: newgen_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  queue:
    image: newgen-app
    container_name: newgen_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: newgen_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
      MYSQL_USER: sail
    logging: *default-logging
    volumes:
      - newgen_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: newgen_redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  reverb:
    image: newgen-app
    container_name: newgen_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  analytics:
    image: allinurl/goaccess
    container_name: newgen_analytics
    restart: unless-stopped
    user: root
    logging: *default-logging
    environment:
      - TZ=Europe/Berlin
    ports:
      - "7817:7817"
    volumes:
      - nginx-logs:/opt/goaccess/logs
    command: /opt/goaccess/logs/access.log --log-format=COMBINED --real-time-html --output=/opt/goaccess/index.html --port=7817
    depends_on:
      - web

  scraper-service:
    build:
      context: ./scraper-service
    container_name: scraper_service
    restart: unless-stopped
    logging: *default-logging
    environment:
      - TM_API_BASE=${TM_API_BASE:-https://tmapi-alpha.transfermarkt.technology}
      - TM_API_BASES=${TM_API_BASES:-}
      - TM_API_TIMEOUT=${TM_API_TIMEOUT:-20}
      - TM_API_PREFERRED_CONTEXT=${TM_API_PREFERRED_CONTEXT:-}
      - TM_API_PROXY=${TM_API_PROXY:-}
    ports:
      - "8001:8000"
    volumes:
      - ./scraper-service:/app
    command: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 1200

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: newgen_phpmyadmin
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mysql
      - MYSQL_ROOT_PASSWORD=password
    depends_on:
      - mysql

volumes:
  newgen_mysql_data:
  redis-data:
  nginx-logs:
  portainer_data:
