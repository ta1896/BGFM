version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: newgen-app
    container_name: newgen_app
    restart: unless-stopped
    working_dir: /var/www
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: nginx:alpine
    container_name: newgen_nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      # - "443:443" # Für Let's Encrypt SSL später
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
      - nginx-logs:/var/log/nginx
    depends_on:
      - app

  scheduler:
    image: newgen-app
    container_name: newgen_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  queue:
    image: newgen-app
    container_name: newgen_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: newgen_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
      MYSQL_USER: sail
    logging: *default-logging
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: newgen_redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  reverb:
    image: newgen-app
    container_name: newgen_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --debug
    logging: *default-logging
    environment:
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - mysql
      - redis

  analytics:
    image: allinone/goaccess
    container_name: newgen_analytics
    restart: unless-stopped
    user: root
    logging: *default-logging
    environment:
      - TZ=Europe/Berlin
    ports:
      - "7817:7817"
    volumes:
      - nginx-logs:/opt/goaccess/logs
    command: /opt/goaccess/logs/access.log --log-format=COMBINED --real-time-html --ws-url=localhost:7817 --output=/var/www/html/index.html --port=7817
    depends_on:
      - web

volumes:
  db-data:
  redis-data:
  nginx-logs:
